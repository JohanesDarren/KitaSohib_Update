
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>KitaSohib - Your Wellness Partner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Plus Jakarta Sans"', 'sans-serif'],
            },
            colors: {
              // Harmony Palette - Updated Primary to BLUE
              primary: {
                50: '#EFF6FF',  // Surface tint (Blue 50)
                100: '#DBEAFE',
                200: '#BFDBFE',
                300: '#93C5FD',
                400: '#60A5FA',
                500: '#3B82F6', // Main Brand (Standard Blue)
                600: '#2563EB', // Hover
                700: '#1D4ED8',
                800: '#1E40AF',
                900: '#1E3A8A',
              },
              secondary: {
                50: '#F0FDFA',
                100: '#CCFBF1',
                500: '#14B8A6', // Teal
                600: '#0D9488',
              },
              accent: {
                50: '#FFF1F2',
                500: '#F43F5E', // Rose
                600: '#E11D48',
              },
              surface: {
                50: '#F8FAFC',  // Page BG
                100: '#F1F5F9', // Card BG
                200: '#E2E8F0', // Border
                300: '#CBD5E1', // Icon inactive
                800: '#1E293B', // Text Primary
                900: '#0F172A', // Heading
              }
            },
            boxShadow: {
              'soft': '0 4px 20px -2px rgba(59, 130, 246, 0.05)',
              'glow': '0 0 15px rgba(59, 130, 246, 0.3)',
              'float': '0 10px 30px -10px rgba(59, 130, 246, 0.1)',
              'inner-light': 'inset 0 2px 4px 0 rgba(255, 255, 255, 0.5)',
            },
            backgroundImage: {
              'gradient-radial': 'radial-gradient(var(--tw-gradient-stops))',
              'glass-gradient': 'linear-gradient(135deg, rgba(255, 255, 255, 0.8), rgba(255, 255, 255, 0.4))',
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #F1F5F9;
        /* Brand-aligned Mesh Gradient (Blueish) */
        background-image: 
          radial-gradient(at 0% 0%, hsla(217, 91%, 91%, 1) 0px, transparent 50%),
          radial-gradient(at 100% 0%, hsla(199, 89%, 91%, 1) 0px, transparent 50%),
          radial-gradient(at 100% 100%, hsla(217, 91%, 93%, 1) 0px, transparent 50%),
          radial-gradient(at 0% 100%, hsla(180, 77%, 92%, 1) 0px, transparent 50%);
        background-attachment: fixed;
        background-size: cover;
        color: #1E293B;
        font-feature-settings: "cv11", "ss01";
        -webkit-tap-highlight-color: transparent;
      }
      
      /* Glassmorphism Classes */
      .glass {
        background: rgba(255, 255, 255, 0.6);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.4);
      }
      
      .glass-card {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.6);
        box-shadow: 0 8px 32px 0 rgba(59, 130, 246, 0.05);
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: #60A5FA; }
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19.0.0",

    "react/jsx-runtime": "https://esm.sh/react@19.0.0/jsx-runtime",

    "react-hot-toast": "https://esm.sh/react-hot-toast@2.4.1?deps=react@19.0.0,react-dom@19.0.0",
    "lucide-react": "https://esm.sh/lucide-react@0.468.0?deps=react@19.0.0",
    "framer-motion": "https://esm.sh/framer-motion@11.15.0?deps=react@19.0.0,react-dom@19.0.0",
    "@google/genai": "https://esm.sh/@google/genai@1.3.0",
    "chart.js": "https://esm.sh/chart.js@4.4.1",
    "react-chartjs-2": "https://esm.sh/react-chartjs-2@5.2.0?deps=react@19.0.0,react-dom@19.0.0,chart.js@4.4.1",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>

    <div id="root"></div>

</body>
